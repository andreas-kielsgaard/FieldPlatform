<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participation Field - Mockup 4</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">PF</span>
      <div>
        <strong>Participation Field</strong>
        <small>Mockup 4 - flow-oriented partition</small>
      </div>
    </div>

    <nav class="main-nav" aria-label="Product areas">
      <button class="nav-button active" data-view="participant">Participant</button>
      <button class="nav-button" data-view="community">Communities & fields</button>
      <button class="nav-button" data-view="creator">Creator</button>
      <button class="nav-button" data-view="steward">Steward</button>
    </nav>

    <div class="topbar-actions">
      <label>
        Persona
        <select id="personaSelect"></select>
      </label>
      <button id="devButton" class="dev-button">Data model explorer</button>
      <button id="resetButton" class="reset-button">Reset</button>
    </div>
  </header>

  <main id="app" class="app-main"></main>

  <aside id="drawer" class="drawer hidden" aria-live="polite">
    <button id="closeDrawer" class="drawer-close" aria-label="Close">x</button>
    <div id="drawerContent"></div>
  </aside>

  <script src="js/data.js"></script>
  <script src="js/calculations.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
